version: 1
backend:
  phases:
    build:
      commands:
        - pyenv install -s 3.12.3
        - pyenv global 3.12.3
        - python --version
        - python -m pip --version
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - node scripts/write-ui-api-env.mjs --required
        - npm ci --prefix ui --cache .npm --prefer-offline
    build:
      commands:
        - npm run build --prefix ui
  artifacts:
    baseDirectory: ui/dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - ui/node_modules/**/*
